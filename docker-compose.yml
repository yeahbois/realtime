services:
  vision-processor:
    build:
      context: ./vision-processor
      dockerfile: Dockerfile
    container_name: gemini-vision-processor
    ports:
      - "8000:8000"
    environment:
      - LIP_DISTANCE_THRESHOLD=${LIP_DISTANCE_THRESHOLD:-0.01}
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gemini-server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - vision-processor
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gemini-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_LIVEKIT_URL=${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
    depends_on:
      - server
    restart: unless-stopped
